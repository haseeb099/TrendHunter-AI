services:
  mysql:
    image: mysql:8.4
    container_name: trendhunter-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-trendhunter}
      MYSQL_USER: ${MYSQL_USER:-trendhunter}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trendhunter}
    volumes:
      - trendhunter_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER:-trendhunter}",
          "-p${MYSQL_PASSWORD:-trendhunter}",
        ]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
        VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}
    container_name: trendhunter-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: mysql://${MYSQL_USER:-trendhunter}:${MYSQL_PASSWORD:-trendhunter}@mysql:3306/${MYSQL_DATABASE:-trendhunter}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      APP_ID: ${APP_ID:-trendhunter}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      UPLOADS_DIR: /app/uploads
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_ENV: ${EBAY_ENV:-sandbox}
      EBAY_MARKETPLACE_ID: ${EBAY_MARKETPLACE_ID:-EBAY_US}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      SERPAPI_AMAZON_DOMAIN: ${SERPAPI_AMAZON_DOMAIN:-amazon.com}
      SERPAPI_GOOGLE_COUNTRY: ${SERPAPI_GOOGLE_COUNTRY:-us}
      SERPAPI_GOOGLE_LANGUAGE: ${SERPAPI_GOOGLE_LANGUAGE:-en}
      SERPAPI_DAILY_CAP: ${SERPAPI_DAILY_CAP:-30}
      JUSTSERP_API_KEY: ${JUSTSERP_API_KEY:-}
      JUSTSERP_DAILY_CAP: ${JUSTSERP_DAILY_CAP:-10}
      TIKTOK_APP_KEY: ${TIKTOK_APP_KEY:-}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET:-}
      TIKTOK_ACCESS_TOKEN: ${TIKTOK_ACCESS_TOKEN:-}
      TIKTOK_SHOP_CIPHER: ${TIKTOK_SHOP_CIPHER:-}
      TIKTOK_API_VERSION: ${TIKTOK_API_VERSION:-202405}
      TIKTOK_SHOP_REGION: ${TIKTOK_SHOP_REGION:-US}
      TIKTOK_SHOP_PROVIDER: ${TIKTOK_SHOP_PROVIDER:-scrapecreators}
      TIKTOK_SHOP_API_KEY: ${TIKTOK_SHOP_API_KEY:-}
      TIKTOK_SHOP_API_BASE: ${TIKTOK_SHOP_API_BASE:-}
      TIKTOK_ADS_DAILY_CAP: ${TIKTOK_ADS_DAILY_CAP:-10}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_ADS_DAILY_CAP: ${META_ADS_DAILY_CAP:-15}
      CJ_API_KEY: ${CJ_API_KEY:-}
      CJ_API_BASE: ${CJ_API_BASE:-}
      CJ_DEFAULT_WAREHOUSE: ${CJ_DEFAULT_WAREHOUSE:-US}
      ALIEXPRESS_APP_KEY: ${ALIEXPRESS_APP_KEY:-}
      ALIEXPRESS_APP_SECRET: ${ALIEXPRESS_APP_SECRET:-}
      ALIEXPRESS_ACCESS_TOKEN: ${ALIEXPRESS_ACCESS_TOKEN:-}
      ALIEXPRESS_SHIP_FROM_DEFAULT: ${ALIEXPRESS_SHIP_FROM_DEFAULT:-CN}
      ROPESHIP_API_KEY: ${ROPESHIP_API_KEY:-}
      ROPESHIP_API_BASE: ${ROPESHIP_API_BASE:-}
      FREE_RETAIL_ENABLED: ${FREE_RETAIL_ENABLED:-false}
      STRICT_TRUTH_MODE: ${STRICT_TRUTH_MODE:-true}
      # Shoptera free EU catalog — set SHOPTERA_ENABLED=true for Shopify/retail live search (300 req/hr)
      SHOPTERA_ENABLED: ${SHOPTERA_ENABLED:-false}
      DEFAULT_REGION: ${DEFAULT_REGION:-US}
      SUPPORTED_REGIONS: ${SUPPORTED_REGIONS:-US,UK,EU,GLOBAL}
      TRENDING_CACHE_TTL_HOURS: ${TRENDING_CACHE_TTL_HOURS:-24}
      TRENDING_MAX_ITEMS: ${TRENDING_MAX_ITEMS:-500}
      SEARCH_CACHE_TTL_HOURS: ${SEARCH_CACHE_TTL_HOURS:-24}
      OFFERS_CACHE_TTL_HOURS: ${OFFERS_CACHE_TTL_HOURS:-24}
      INGEST_MODE: ${INGEST_MODE:-cache_first}
      DISCOVERY_QUEUE_MAX_PER_RUN: ${DISCOVERY_QUEUE_MAX_PER_RUN:-40}
      DISCOVERY_QUEUE_PRIORITY_MIN: ${DISCOVERY_QUEUE_PRIORITY_MIN:-0.4}
      RANKING_VERSION: ${RANKING_VERSION:-v3}
      HEALTH_PROBE_EXTERNAL: ${HEALTH_PROBE_EXTERNAL:-false}
      LIVE_SEARCH_REQUIRES_CREDITS: ${LIVE_SEARCH_REQUIRES_CREDITS:-true}
      REDIS_URL: ${REDIS_URL:-}
      INGEST_SECRET: ${INGEST_SECRET:-}
      SEARCHAPI_KEY: ${SEARCHAPI_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      INTEL_DIGEST_ENABLED: ${INTEL_DIGEST_ENABLED:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-}
      STRIPE_PRICE_AGENCY: ${STRIPE_PRICE_AGENCY:-}
      STRIPE_PRICE_CREDITS_50: ${STRIPE_PRICE_CREDITS_50:-}
      STRIPE_PRICE_CREDITS_100: ${STRIPE_PRICE_CREDITS_100:-}
      STRIPE_PRICE_CREDITS_250: ${STRIPE_PRICE_CREDITS_250:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      BETA_MODE: ${BETA_MODE:-false}
      BETA_INVITE_CODE: ${BETA_INVITE_CODE:-}
    volumes:
      - trendhunter_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  trendhunter_mysql_data:
  trendhunter_uploads:

