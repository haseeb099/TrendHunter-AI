services:
  mysql:
    image: mysql:8.4
    container_name: trendhunter-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trendhunter
      MYSQL_USER: trendhunter
      MYSQL_PASSWORD: trendhunter
    volumes:
      - trendhunter_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trendhunter_mysql_data:
