name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Unit tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: trendhunter
          MYSQL_USER: trendhunter
          MYSQL_PASSWORD: trendhunter
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: mysql://trendhunter:trendhunter@127.0.0.1:3306/trendhunter

      - name: Seed E2E catalog fixtures
        run: pnpm tsx scripts/seed-ci-e2e.ts
        env:
          DATABASE_URL: mysql://trendhunter:trendhunter@127.0.0.1:3306/trendhunter
          FREE_RETAIL_ENABLED: "true"
          STRICT_TRUTH_MODE: "false"

      - name: Start server
        run: |
          pnpm build
          node dist/index.js &
          echo $! > server.pid
        env:
          DATABASE_URL: mysql://trendhunter:trendhunter@127.0.0.1:3306/trendhunter
          JWT_SECRET: ci-test-jwt-secret-min-32-chars-long
          PORT: "3005"
          NODE_ENV: production
          FREE_RETAIL_ENABLED: "true"
          STRICT_TRUTH_MODE: "false"
          RESEND_API_KEY: re_ci_test_key_not_used_for_real_email
          STRIPE_SECRET_KEY: sk_test_ci_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
          STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:3005/api/trpc/system.health?input=%7B%22json%22%3A%7B%22timestamp%22%3A0%7D%7D" > /dev/null 2>&1; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: E2E API tests
        run: pnpm test:e2e
        env:
          APP_URL: http://127.0.0.1:3005
          DATABASE_URL: mysql://trendhunter:trendhunter@127.0.0.1:3306/trendhunter

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill "$(cat server.pid)" || true; fi
